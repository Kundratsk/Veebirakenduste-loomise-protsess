<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>Interaktiivne Veebileht</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    section {
      margin-bottom: 30px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px 0;
    }

    button {
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: #45a049;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 5px;
      background: #eee;
      margin-top: 5px;
      display: flex;
      justify-content: space-between;
    }

    .error {
      color: red;
      font-size: 14px;
    }

    .result {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Interaktiivne Veebileht</h1>

<div class="container">

  <!-- TO-DO LIST -->
  <section>
    <h2>📝 To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Sisesta ülesanne">
    <button onclick="addTask()">Lisa</button>
    <ul id="taskList"></ul>
  </section>

  <!-- KALKULAATOR -->
  <section>
    <h2>🧮 Kalkulaator</h2>
    <input type="number" id="num1" placeholder="Esimene number">
    <input type="number" id="num2" placeholder="Teine number">
    
    <select id="operation">
      <option value="+">Liitmine (+)</option>
      <option value="-">Lahutamine (-)</option>
      <option value="*">Korrutamine (*)</option>
      <option value="/">Jagamine (/)</option>
    </select>

    <button onclick="calculate()">Arvuta</button>
    <div class="result" id="calcResult"></div>
  </section>

  <!-- VORMI VALIDEERIMINE -->
  <section>
    <h2>📋 Registreerimisvorm</h2>
    <input type="text" id="name" placeholder="Nimi">
    <input type="email" id="email" placeholder="Email">
    <button onclick="validateForm()">Saada</button>
    <div class="error" id="formError"></div>
  </section>

</div>

<script>
  // TO-DO LIST
  function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();

    if (taskText === "") return;

    const li = document.createElement("li");
    li.textContent = taskText;

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "❌";
    removeBtn.onclick = () => li.remove();

    li.appendChild(removeBtn);
    document.getElementById("taskList").appendChild(li);

    input.value = "";
  }

  // KALKULAATOR
  function calculate() {
    const num1 = parseFloat(document.getElementById("num1").value);
    const num2 = parseFloat(document.getElementById("num2").value);
    const op = document.getElementById("operation").value;

    let result;

    if (isNaN(num1) || isNaN(num2)) {
      result = "Palun sisesta numbrid!";
    } else {
      switch(op) {
        case "+": result = num1 + num2; break;
        case "-": result = num1 - num2; break;
        case "*": result = num1 * num2; break;
        case "/": result = num2 !== 0 ? num1 / num2 : "Ei saa jagada nulliga"; break;
      }
    }

    document.getElementById("calcResult").textContent = "Tulemus: " + result;
  }

  // VORMI VALIDEERIMINE
  function validateForm() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const errorDiv = document.getElementById("formError");

    if (name === "" || email === "") {
      errorDiv.textContent = "Kõik väljad peavad olema täidetud!";
      return;
    }

    if (!email.includes("@")) {
      errorDiv.textContent = "Email ei ole korrektne!";
      return;
    }

    errorDiv.style.color = "green";
    errorDiv.textContent = "Registreerimine õnnestus!";
  }
</script>

</body>
</html>
